{% extends 'portfolio/base.html' %}

{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <i class="fas fa-check-circle text-success fa-4x mb-4"></i>
                <h2 class="text-success mb-3">Successfully Logged Out</h2>
                <p class="text-muted mb-4">You have been successfully logged out of your account.</p>
                <div class="d-grid gap-2">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Login Again
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                        <i class="fas fa-home me-2"></i>Go to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto-redirect to home after 3 seconds
    setTimeout(function() {
        window.location.href = "{% url 'home' %}";
    }, 3000);
</script>
{% endblock %}
